apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventory-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inventory-service

  template:
    metadata:
      labels:
        app: inventory-service

    spec:
      containers:
      - name: inventory-service
        image: 181640953339.dkr.ecr.us-east-1.amazonaws.com/inventory-service:2.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
