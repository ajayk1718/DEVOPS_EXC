apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service
        image: 181640953339.dkr.ecr.us-east-1.amazonaws.com/payment-service:3.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
