apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: busybox
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting Payment Service..."
          echo "Current Token: $API_TOKEN"
          echo "Token validation failed"
          echo "401 Unauthorized"
          sleep 3600
        env:
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: API_TOKEN
