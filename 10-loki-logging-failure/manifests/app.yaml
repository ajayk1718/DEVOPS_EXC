apiVersion: apps/v1
kind: Deployment

metadata:
  name: log-generator

spec:
  replicas: 1

  selector:
    matchLabels:
      app: log-generator

  template:
    metadata:
      labels:
        app: log-generator

    spec:
      containers:
      - name: log-generator
        image: busybox

        command:
        - /bin/sh
        - -c
        - |
          while true
          do
            echo "Application log generated"
            sleep 5
          done
